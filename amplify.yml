version: 1
applications:
  - appRoot: apps/web-nami
    frontend:
      phases:
        preBuild:
          commands:
            - echo "Installing dependencies..."
            - cd ../..
            - npm ci
        build:
          commands:
            - echo "Building packages with Turbo..."
            - npx turbo run build --filter=@namiuy/bff-core --filter=web-nami
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - node_modules/**/*
          - ../../packages/bff-core/node_modules/**/*
          - ../../packages/shared/node_modules/**/*
          - ../../packages/ui/node_modules/**/*
          - .next/cache/**/*
