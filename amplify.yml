version: 1
applications:
  - appRoot: apps/web-nami
    platform: WEB_COMPUTE
    frontend:
      buildPath: /
      phases:
        preBuild:
          commands:
            - echo "Installing dependencies..."
            - npm ci
            - echo "Installing Turbo 1.x globally..."
            - npm install -g turbo@1.13.4
        build:
          commands:
            - echo "Building packages with Turbo..."
            - npx turbo run build --filter=web-nami
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - ../../node_modules/**/*
          - .next/cache/**/*
