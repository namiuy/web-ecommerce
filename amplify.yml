version: 1
applications:
  - appRoot: apps/web-nami
    platform: WEB_COMPUTE
    frontend:
      phases:
        preBuild:
          commands:
            - echo "Current directory:"
            - pwd
            - echo "CODEBUILD_SRC_DIR value:"
            - echo $CODEBUILD_SRC_DIR
            - echo "Listing CODEBUILD_SRC_DIR:"
            - ls -la $CODEBUILD_SRC_DIR
            - echo "Installing dependencies from monorepo root..."
            - cd $CODEBUILD_SRC_DIR/web
            - echo "After cd, now at:"
            - pwd
            - ls -la | grep package
            - npm ci
        build:
          commands:
            - echo "Building WITHOUT Turbo (direct npm run build)..."
            - cd $CODEBUILD_SRC_DIR/web
            - echo "=== ENVIRONMENT VARIABLES DEBUG ==="
            - echo "NEXT_PUBLIC_API_BASE_URL=$NEXT_PUBLIC_API_BASE_URL"
            - echo "ID=$ID"
            - echo "APP_NAME=$APP_NAME"
            - echo "===================================="
            - echo "Building web-nami app directly (packages are TypeScript, no build needed)..."
            - cd apps/web-nami
            - npm run build
            - echo "Listing build output..."
            - ls -la .next
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*
